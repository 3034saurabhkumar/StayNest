spring:
  application:
    name: staynest

  #DB Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST_URL}:5432/${DB_NAME}

  jpa:
    hibernate:
      ddl-auto: validate

  #flyway configuration
  flyway:
    baseline-on-migrate: true

server:
  servlet:
    context-path: /api/v1

jwt:
  secretKey: ${JWT_SECRET_KEY}

frontend:
  url: http://${FRONTEND_URL}:8080

stripe:
  secret:
    key: ${STRIPE_SECRET_KEY}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET}

my:
  variable: prod